name: CI - Vérification des Pull Requests

on:
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: write

jobs:
  verify:
    name: Verify Generation Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositories
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.14.5'

      - name: Install Pandoc
        uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e
        with:
          version: 3.9.0.2

      - name: Setup DuckDB action
        uses: opt-nc/setup-duckdb-action@69cdd8ddbc31d02a76e4b733fdfad3b19123a3e7

      - id: install-schemacrawler
        name: Install SchemaCrawler
        uses: schemacrawler/SchemaCrawler-Local-Action@88ea514f67b74c57de8d5330816d2223f65c9a71

      - name: Install Graphviz to generate schemas
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install Asciidoctor PDF via APT
        run: sudo apt-get update && sudo apt-get install -y ruby-asciidoctor-pdf
      
      - name: Install hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78
        with:
          hugo-version: '0.163.0'

      - name: Build DuckDB and SQLite databases
        run: |
          task duckdb
          task sqlite

      - name: Generating SchemaCrawler schemas
        shell: bash
        env:
          SDKMAN_DIR: ${{ github.workspace }}/.sdkman
        run: |
          source "$SDKMAN_DIR/bin/sdkman-init.sh"
          
          BASE_CMD="schemacrawler.sh --info-level=standard --driver=org.duckdb.DuckDBDriver --url=jdbc:duckdb:dist/ref-metiers-opt-nc.duckdb --config-file=.github/schemacrawler/config/schemacrawler.config.properties --command=schema"
          $BASE_CMD --output-format=pdf --output-file=dist/ref-metiers-opt-nc-schema.pdf
          $BASE_CMD --output-format=png --output-file=dist/ref-metiers-opt-nc-schema.png
          $BASE_CMD --output-format=html --output-file=dist/ref-metiers-opt-nc-schema.html

      - name: Generate documentation
        run: |
          task docs
      
      - name: Generate Hugo site
        run: task site
      
          
