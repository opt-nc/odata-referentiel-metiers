name: CI pour la branche develop

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
    
jobs:
  build:
    name: DuckDB Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opt-nc/setup-duckdb-action@v1.2.6
      
      - name: Load DuckDB database
        run: |
          mkdir dist
          duckdb dist/gem.duckdb < src/duck.sql

      - name: update output repository and push to develop
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UNIQUE_BRANCH="develop-data-update-${{ github.run_number }}"
          LAST=$(gh release view --json tagName -q .tagName 2>/dev/null || echo "v0.0")
          VERSION=${FIRST#v}
          
          MAJOR=$(echo "$VERSION" | cut -d. -f1) 
          MINOR=$(echo "$VERSION" | cut -d. -f2) 
          DEVELOP_VERSION=$(echo "$VERSION" | cut -d. -f2) 
          NEW="v${MAJOR}.$((MINOR + 1))-develop.$DEVELOP_VERSION" 

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git fetch origin
          git checkout -b $UNIQUE_BRANCH
          
          git add data/output/*.csv
          git commit -m "Updated output's files"
          git merge origin/main
          git push origin $UNIQUE_BRANCH

          gh pr create --head $UNIQUE_BRANCH --base main --title "Updated develop branch's output's files" --body "Cette Pull Request a été générée automatiquement par la CI. Elle contient les fichiers CSV mis à jour."

          gh pr merge $UNIQUE_BRANCH --merge --delete-branch

          gh release create $NEW --title "Release $NEW" --notes "Mise à jour automatique du référentiel d'export des métiers." --target main dist/gem.duckdb
