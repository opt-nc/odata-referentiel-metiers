name: CI pour la branche main

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90
        with:
          extra_plugins: |
            @semantic-release/exec
            @semantic-release/git
            @semantic-release/release-notes-generator
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate_duckdb:
    name: Generating DuckDB File
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositories
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup DuckDB action
        uses: opt-nc/setup-duckdb-action@v1.2.6

      - name: Load DuckDB database
        run: |
          mkdir dist
          duckdb dist/ref-metiers-opt-nc.duckdb < src/duck.sql

      - name: Upload DuckDB artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: duckdb-file
          path: dist/ref-metiers-opt-nc.duckdb

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: csv-files
          path: data/output/csv/

  generate_sqlite:
    name: Generating SQLite File
    runs-on: ubuntu-latest
    needs: generate_duckdb
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Download CSV artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: csv-files
          path: data/output/csv/

      - name: Load SQLite database
        run: |
          mkdir dist
          mkdir -p data/output/csv
          sqlite3 dist/ref-metiers-opt-nc.sqlite < src/sqlite.sql

      - name: Upload SQLite artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sqlite-file
          path: dist/ref-metiers-opt-nc.sqlite

  update_output_repository:
    name: Updating output repository
    runs-on: ubuntu-latest
    needs: [ release, generate_duckdb, generate_sqlite ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Download DuckDB artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: duckdb-file
          path: dist

      - name: Download SQLite artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: sqlite-file
          path: dist

      - name: Download CSV artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: csv-files
          path: data/output/csv/

      - name: Push CSV outputs to main using PR
        run: |
          UNIQUE_BRANCH="${{ needs.compute.outputs.new_release_version }}"

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin
          git checkout -b $UNIQUE_BRANCH

          git stash
          git merge origin/main --no-edit -X theirs || true
          git stash pop || true

          git add -f data/output/csv/about.csv
          git add -f data/output/csv/categorie_detention.csv
          git add -f data/output/csv/competence.csv
          git add -f data/output/csv/competence_utilisateur.csv
          git add -f data/output/csv/famille_metier.csv
          git add -f data/output/csv/gem_competence.csv
          git add -f data/output/csv/gem_metier.csv
          git add -f data/output/csv/gem_metier_competence.csv
          git add -f data/output/csv/groupe_competence.csv
          git add -f data/output/csv/metier.csv
          git add -f data/output/csv/metier_competence.csv
          git add -f data/output/csv/niveau_description_competence.csv
          git add -f data/output/csv/referentiel_competence.csv
          git add -f data/output/csv/statut_metier.csv

          git commit -m "Updated output's files"
          git push origin $UNIQUE_BRANCH
          gh pr create --head $UNIQUE_BRANCH --base main --title "Updated main branch's output's files" --body "Cette Pull Request a été générée automatiquement par la CI. Elle contient les fichiers CSV mis à jour."
          gh pr merge $UNIQUE_BRANCH --merge --delete-branch

      - name: Upload Release assets
        run: |
          gh release upload $VERSION dist/ref-metiers-opt-nc.duckdb dist/ref-metiers-opt-nc.sqlite dist/ref-metiers-opt-nc-schema.html

  cleanup:
    name: Cleanup Pre-Releases
    runs-on: ubuntu-latest
    needs: [ release ]
    if: github.ref == 'refs/heads/main' && needs.release.outputs.new_release_published == 'true'
    steps:
      - name: Delete pre-releases
        uses: dev-drprasad/delete-older-releases@dfbe6be2a006e9475dfcbe5b8d201f1824c2a9fe
        with:
          delete_tag_pattern: develop
          keep_latest: 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}