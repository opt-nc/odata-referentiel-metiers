name: CI pour la branche main

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compute:
    uses: ./.github/workflows/compute-version.yml
    secrets: inherit

  build:
    name: DuckDB Integration
    runs-on: ubuntu-latest
    needs: compute
    steps:
      - uses: actions/checkout@v4

      - uses: opt-nc/setup-duckdb-action@v1.2.6

      - name: Load DuckDB database
        run: |
          mkdir dist
          duckdb dist/ref-metiers-opt-nc.duckdb < src/duck.sql

      - name: Load SQLite database
        run: |
          sqlite3 dist/ref-metiers-opt-nc.sqlite < src/sqlite.sql

      - name: update output repository and push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UNIQUE_BRANCH="${{ needs.compute.outputs.unique_branch }}"
          NEW="${{ needs.compute.outputs.new_version }}"

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git fetch origin
          git checkout -b $UNIQUE_BRANCH

          git stash
          git merge origin/main --no-edit -X theirs || true
          git stash pop || true
          
          git add -f data/output/about.csv
          git add -f data/output/categorie_detention.csv
          git add -f data/output/competence.csv
          git add -f data/output/competence_utilisateur.csv
          git add -f data/output/famille_metier.csv
          git add -f data/output/gem_competence.csv
          git add -f data/output/gem_metier.csv
          git add -f data/output/gem_metier_competence.csv
          git add -f data/output/groupe_competence.csv
          git add -f data/output/metier.csv
          git add -f data/output/metier_competence.csv
          git add -f data/output/niveau_description_competence.csv
          git add -f data/output/referentiel_competence.csv
          git add -f data/output/sous_famille_metier.csv
          git add -f data/output/statut_metier.csv
          git commit -m "Updated output's files"
          git push origin $UNIQUE_BRANCH

          gh pr create --head $UNIQUE_BRANCH --base main --title "Updated main branch's output's files" --body "Cette Pull Request a été générée automatiquement par la CI. Elle contient les fichiers CSV mis à jour."
          gh pr merge $UNIQUE_BRANCH --merge --delete-branch 
          gh release create $NEW --title "Release $NEW" --notes "Mise à jour automatique du référentiel d'export des métiers." --target main dist/ref-metiers-opt-nc.duckdb dist/ref-metiers-opt-nc.sqlite
