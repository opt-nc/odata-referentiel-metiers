name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compute:
    uses: ./.github/workflows/compute-version.yml
    secrets: inherit
  build:
    name: DuckDB Integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: opt-nc/setup-duckdb-action@v1.2.6
      
      - name: Load DuckDB database
        run: |
          mkdir dist
          duckdb dist/gem.duckdb < src/duck.sql

      - name: update output repository and push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          UNIQUE_BRANCH="${{ needs.compute.outputs.unique_branch }}"
          NEW="${{ needs.compute.outputs.new_version }}"

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git fetch origin
          git checkout -b $UNIQUE_BRANCH
          
          git add data/output/*.csv
          git commit -m "Updated output's files"
          git merge origin/main
          git push origin $UNIQUE_BRANCH

          gh pr create --head $UNIQUE_BRANCH --base main --title "Updated main branch's output's files" --body "Cette Pull Request a été générée automatiquement par la CI. Elle contient les fichiers CSV mis à jour."

          gh pr merge $UNIQUE_BRANCH --merge --delete-branch

          gh release create $NEW --title "Release $NEW" --notes "Mise à jour automatique du référentiel d'export des métiers." --target main dist/gem.duckdb
