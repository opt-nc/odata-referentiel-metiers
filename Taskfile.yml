version: '3'

vars:
  DIST_DIR: dist
  OUTPUT_DIR: data/output
  OUTPUT_SQL_DIR: data/output/sql
  GENERATED_CSV_DIR: data/output/csv
  SITE_DIR: site
  DOCS_DIR: data/output/docs

  DUCK_SQL_FILE: src/duck.sql
  SQLITE_SQL_FILE: src/sqlite.sql
  PY_GENERATE_ADOC: src/generate-adoc.py
  PY_GENERATE_MD: src/generate-md.py
  HUGO_CONFIG_FILE: etc/config/hugo/hugo.toml
  HUGO_LAYOUTS_DIR: etc/config/hugo/layouts
  HUGO_CONTENT_FOOTER_PARTIAL: etc/config/hugo/partials/content-footer.html
  HUGO_THEME_COMMIT: 8bb66fa674351f3a0b0917a7552caac686eca920

  DUCKDB_FILE: dist/ref-metiers-opt-nc.duckdb
  SQLITE_FILE: dist/ref-metiers-opt-nc.sqlite
  LOAD_SQL_SOURCE_FILE: data/output/csv/load.sql
  LOAD_SQL_FILE: data/output/sql/load.sql
  SCHEMA_SQL_SOURCE_FILE: data/output/csv/schema.sql
  SCHEMA_SQL_FILE: data/output/sql/schema.sql

  LINT_REPORT_FILE: dist/lint_report.txt
  SCHEMA_HTML_FILE: dist/ref-metiers-opt-nc-schema.html
  SCHEMA_PNG_FILE: dist/ref-metiers-opt-nc-schema.png
  SCHEMA_PDF_FILE: dist/ref-metiers-opt-nc-schema.pdf

  ADOC_FILE: data/output/docs/referentiel_metiers.adoc
  PDF_FILE: data/output/docs/referentiel_metiers.pdf
  EPUB_FILE: data/output/docs/referentiel_metiers.epub

  SC_BASE: >-
    schemacrawler
    --info-level=standard
    --driver=org.duckdb.DuckDBDriver
    --url="jdbc:duckdb:{{.DUCKDB_FILE}}"

tasks:
  default:
    desc: Recrée les bases de données DuckDB et SQLite, puis génère la documentation complète du projet.
    cmds:
      - task: clean
      - task: duckdb
      - task: sqlite
      - task: schema
      - task: docs
      - task: site
    silent: true

  clean:
    desc: Nettoie les sorties générées et le site Hugo.
    cmds:
      - rm -rf "{{.DIST_DIR}}"
      - rm -rf "{{.OUTPUT_DIR}}"
      - rm -rf "{{.SITE_DIR}}"
      - rm -rf .venv
      - cmd: printf "\033[32mtask [clean] Nettoyage des fichiers générés et du site Hugo terminé.\033[0m\n"
    silent: true

  duckdb:
    desc: Crée le dossier dist et initialise la base DuckDB depuis le SQL
    cmds:
      - mkdir -p "{{.DIST_DIR}}"
      - mkdir -p "{{.OUTPUT_DIR}}"
      - duckdb "{{.DUCKDB_FILE}}" < "{{.DUCK_SQL_FILE}}"
      - mkdir -p "{{.OUTPUT_SQL_DIR}}"
      - mv "{{.LOAD_SQL_SOURCE_FILE}}" "{{.LOAD_SQL_FILE}}"
      - mv "{{.SCHEMA_SQL_SOURCE_FILE}}" "{{.SCHEMA_SQL_FILE}}"
      - cmd: printf "\033[32mtask [duckdb] Base de données DuckDB initialisée avec succès.\033[0m\n"
    silent: true

  sqlite:
    desc: Initialise la base SQLite depuis les csv générés par DuckDB.
    cmds:
      - sqlite3 "{{.SQLITE_FILE}}" < "{{.SQLITE_SQL_FILE}}"
      - cmd: printf "\033[32mtask [sqlite] Base de données SQLite initialisée avec succès.\033[0m\n"
    silent: true

  schema:
    desc: Génère les schémas de la base de données avec SchemaCrawler.
    cmds:
      - |
        {{.SC_BASE}} \
          --command=lint \
          --linter-configs=.github/schemacrawler/config/schemacrawler-linter-configs.yaml \
          --output-format=text \
          --output-file="{{.LINT_REPORT_FILE}}"
      - cmd: printf "\033[32mtask [schema] Rapport du lint généré avec succès.\033[0m\n"

      - |
        {{.SC_BASE}} \
          --config-file=.github/schemacrawler/config/schemacrawler.config.properties \
          --command=schema \
          --table-types=TABLE \
          --output-format=html \
          --output-file="{{.SCHEMA_HTML_FILE}}"
      - cmd: printf "\033[32mtask [schema] Schéma HTML de la base de données généré avec succès.\033[0m\n"

      - |
        {{.SC_BASE}} \
          --config-file=.github/schemacrawler/config/schemacrawler.config.properties \
          --command=schema \
          --output-format=png \
          --output-file="{{.SCHEMA_PNG_FILE}}"
      - cmd: printf "\033[32mtask [schema] Schéma PNG de la base de données généré avec succès.\033[0m\n"

      - |
        {{.SC_BASE}} \
          --config-file=.github/schemacrawler/config/schemacrawler.config.properties \
          --command=schema \
          --output-format=pdf \
          --output-file="{{.SCHEMA_PDF_FILE}}"
      - cmd: printf "\033[32mtask [schema] Schéma PDF de la base de données généré avec succès.\033[0m\n"
    silent: true

  docs:
    desc: Génère la documentation PDF avec Asciidoctor et l'EPUB avec Pandoc.
    cmds:
      - task: setup-python

      - uv run "{{.PY_GENERATE_ADOC}}" --duckdb "{{.DUCKDB_FILE}}" --docs-dir "{{.DOCS_DIR}}" --output-file "{{.ADOC_FILE}}"
      - cmd: printf "\033[32mtask [docs] Fichier AsciiDoc généré avec succès.\033[0m\n"

      - |
        asciidoctor-pdf \
          -B . \
          -a icons=font \
          -a icon-set=fas \
          -a imagesdir=data/static/assets \
          -a pdf-theme=etc/themes/pdf-theme.yml \
          -d book \
          -o "{{.PDF_FILE}}" \
          "{{.ADOC_FILE}}"
      - cmd: printf "\033[32mtask [docs] Documentation PDF générée avec succès.\033[0m\n"

      - |
        pandoc \
          --from=asciidoc \
          --to=epub3 \
          --resource-path=.:data/static/assets \
          --css=etc/themes/epub-style.css \
          --epub-cover-image=data/static/assets/docs-assets/cover/file-cover.png \
          --epub-title-page=false \
          --epub-embed-font=data/static/assets/fonts/fontawesome/fa-solid-900.ttf \
          -M identifier="urn:uuid:7c6fa56c-6df5-4bb4-a0a1-8cb4a6f7f8b0" \
          --output="{{.EPUB_FILE}}" \
          "{{.ADOC_FILE}}"
      - cmd: printf "\033[32mtask [docs] Documentation EPUB générée avec succès.\033[0m\n"
    silent: true

  site:
    desc: Crée puis génère le site Hugo avec le thème Relearn.
    cmds:
      - task: setup-python
      
      - rm -rf "{{.SITE_DIR}}"
      - hugo new site "{{.SITE_DIR}}"

      - git clone --no-checkout https://github.com/McShelby/hugo-theme-relearn.git "{{.SITE_DIR}}/themes/hugo-theme-relearn"
      - git -C "{{.SITE_DIR}}/themes/hugo-theme-relearn" fetch --depth 1 origin "{{.HUGO_THEME_COMMIT}}"
      - git -C "{{.SITE_DIR}}/themes/hugo-theme-relearn" checkout FETCH_HEAD
      - rm -rf "{{.SITE_DIR}}/themes/hugo-theme-relearn/.git"

      - uv run "{{.PY_GENERATE_MD}}" --duckdb "{{.DUCKDB_FILE}}" --site-dir "{{.SITE_DIR}}"
      
      - mkdir -p "{{.SITE_DIR}}/assets/css"
      - cp etc/themes/opt-light-theme.css "{{.SITE_DIR}}/assets/css/theme-opt-light-theme.css"
      - cp etc/themes/opt-dark-theme.css "{{.SITE_DIR}}/assets/css/theme-opt-dark-theme.css"
      - mkdir -p "{{.SITE_DIR}}/static/assets/logo"
      - cp data/static/assets/logo/OPT_NC_2.png "{{.SITE_DIR}}/static/assets/logo/OPT_NC_2.png"
      - mkdir -p "{{.SITE_DIR}}/layouts/partials"
      - cp "{{.HUGO_CONTENT_FOOTER_PARTIAL}}" "{{.SITE_DIR}}/layouts/partials/content-footer.html"
      - cp -R "{{.HUGO_LAYOUTS_DIR}}/." "{{.SITE_DIR}}/layouts/."

      - cp "{{.HUGO_CONFIG_FILE}}" "{{.SITE_DIR}}/hugo.toml"
      - hugo -s "{{.SITE_DIR}}"

      - cmd: printf "\033[32mtask [site] Site Hugo généré avec succès dans {{.SITE_DIR}}/public.\033[0m\n"
    silent: true

  install-uv:
    desc: Vérifie si uv est installé, sinon l'installe.
    status:
      - uv --version
    cmds:
      - pip install uv
    silent: true

  setup-python:
    desc: Install la version Python fixée sur .python-version et ajoute les dépendances Python nécessaires.
    deps: [install-uv]
    cmds:
      - uv venv --clear
      - uv pip install -r requirements.txt
    silent: true
