version: '3'

vars:
  SITE_DIR: site
  SC_BASE: >-
    schemacrawler
    --info-level=standard
    --driver=org.duckdb.DuckDBDriver
    --url="jdbc:duckdb:dist/ref-metiers-opt-nc.duckdb"

tasks:
  default:
    desc: Recrée les bases de données DuckDB et SQLite, puis génère la documentation complète du projet.
    cmds:
      - task: clean
      - task: duckdb
      - task: sqlite
      - task: schema
      - task: docs
      - task: site
    silent: true

  clean:
    desc: Nettoie les sorties générées et le site Hugo.
    cmds:
      - rm -rf dist
      - rm -rf data/output
      - rm -rf "{{.SITE_DIR}}"
      - rm -rf .venv
      - cmd: printf "\033[32mtask [clean] Nettoyage des fichiers générés et du site Hugo terminé.\033[0m\n"
        platforms: [linux]
      - cmd: powershell -NoProfile -Command "Write-Host 'task [clean] Nettoyage des fichiers générés et du site Hugo terminé.' -ForegroundColor Green"
        platforms: [windows]
    silent: true

  duckdb:
    desc: Crée le dossier dist et initialise la base DuckDB depuis le SQL
    cmds:
      - mkdir -p dist
      - mkdir -p data/output
      - duckdb dist/ref-metiers-opt-nc.duckdb < src/duck.sql
      - mkdir -p data/output/sql
      - mv data/output/csv/load.sql data/output/sql/load.sql
      - mv data/output/csv/schema.sql data/output/sql/schema.sql
      - cmd: printf "\033[32mtask [duckdb] Base de données DuckDB initialisée avec succès.\033[0m\n"
        platforms: [linux]
      - cmd: powershell -NoProfile -Command "Write-Host 'task [duckdb] Base de données DuckDB initialisée avec succès.' -ForegroundColor Green"
        platforms: [windows]
    silent: true

  sqlite:
    desc: Initialise la base SQLite depuis les csv générés par DuckDB.
    cmds:
      - sqlite3 dist/ref-metiers-opt-nc.sqlite < src/sqlite.sql
      - cmd: printf "\033[32mtask [sqlite] Base de données SQLite initialisée avec succès.\033[0m\n"
        platforms: [linux]
      - cmd: powershell -NoProfile -Command "Write-Host 'task [sqlite] Base de données SQLite initialisée avec succès.' -ForegroundColor Green"
        platforms: [windows]
    silent: true

  schema:
    desc: Génère les schémas de la base de données avec SchemaCrawler.
    cmds:
      - |
        {{.SC_BASE}} \
          --command=lint \
          --linter-configs=.github/schemacrawler/config/schemacrawler-linter-configs.yaml \
          --output-format=text \
          --output-file=dist/lint_report.txt
      - cmd: printf "\033[32mtask [schema] Rapport du lint généré avec succès.\033[0m\n"
        platforms: [linux]
      - cmd: powershell -NoProfile -Command "Write-Host 'task [schema] Rapport de linting généré avec succès.' -ForegroundColor Green"
        platforms: [windows]

      - |
        {{.SC_BASE}} \
          --config-file=.github/schemacrawler/config/schemacrawler.config.properties \
          --command=schema \
          --table-types=TABLE \
          --output-format=html \
          --output-file=dist/ref-metiers-opt-nc-schema.html
      - cmd: printf "\033[32mtask [schema] Schéma HTML de la base de données généré avec succès.\033[0m\n"
        platforms: [linux]
      - cmd: powershell -NoProfile -Command "Write-Host 'task [schema] Schéma HTML de la base de données généré avec succès.' -ForegroundColor Green"
        platforms: [windows]

      - |
        {{.SC_BASE}} \
          --config-file=.github/schemacrawler/config/schemacrawler.config.properties \
          --command=schema \
          --output-format=png \
          --output-file=dist/ref-metiers-opt-nc-schema.png
      - cmd: printf "\033[32mtask [schema] Schéma PNG de la base de données généré avec succès.\033[0m\n"
        platforms: [linux]
      - cmd: powershell -NoProfile -Command "Write-Host 'task [schema] Schéma PNG de la base de données généré avec succès.' -ForegroundColor Green"
        platforms: [windows]

      - |
        {{.SC_BASE}} \
          --config-file=.github/schemacrawler/config/schemacrawler.config.properties \
          --command=schema \
          --output-format=pdf \
          --output-file=dist/ref-metiers-opt-nc-schema.pdf
      - cmd: printf "\033[32mtask [schema] Schéma PDF de la base de données généré avec succès.\033[0m\n"
        platforms: [linux]
      - cmd: powershell -NoProfile -Command "Write-Host 'task [schema] Schéma PDF de la base de données généré avec succès.' -ForegroundColor Green"
        platforms: [windows]
    silent: true

  docs:
    desc: Génère la documentation PDF avec Asciidoctor et l'EPUB avec Pandoc.
    cmds:
      - task: setup-python

      - uv run src/generate-adoc.py
      - cmd: printf "\033[32mtask [docs] Fichier AsciiDoc généré avec succès.\033[0m\n"
        platforms: [linux]
      - cmd: powershell -NoProfile -Command "Write-Host 'task [docs] Fichier AsciiDoc généré avec succès.' -ForegroundColor Green"
        platforms: [windows]

      - |
        asciidoctor-pdf \
          -B . \
          -a icons=font \
          -a icon-set=fas \
          -a imagesdir=data/static/assets \
          -a pdf-theme=etc/themes/pdf-theme.yml \
          -d book \
          data/output/docs/referentiel_metiers.adoc
      - cmd: printf "\033[32mtask [docs] Documentation PDF générée avec succès.\033[0m\n"
        platforms: [linux]
      - cmd: powershell -NoProfile -Command "Write-Host 'task [docs] Documentation PDF générée avec succès.' -ForegroundColor Green"
        platforms: [windows]

      - |
        pandoc \
          --from=asciidoc \
          --to=epub3 \
          --resource-path=.:data/static/assets \
          --css=etc/themes/epub-style.css \
          --epub-cover-image=data/static/assets/docs-assets/cover/file-cover.png \
          --epub-title-page=false \
          --epub-embed-font=data/static/assets/fonts/fontawesome/fa-solid-900.ttf \
          -M identifier="urn:uuid:7c6fa56c-6df5-4bb4-a0a1-8cb4a6f7f8b0" \
          --output=data/output/docs/referentiel_metiers.epub \
          data/output/docs/referentiel_metiers.adoc
      - cmd: printf "\033[32mtask [docs] Documentation EPUB générée avec succès.\033[0m\n"
        platforms: [linux]
      - cmd: powershell -NoProfile -Command "Write-Host 'task [docs] Documentation EPUB générée avec succès.' -ForegroundColor Green"
        platforms: [windows]
    silent: true

  site:
    desc: Crée puis génère le site Hugo avec le thème Relearn.
    cmds:
      - rm -rf "{{.SITE_DIR}}"
      - hugo new site "{{.SITE_DIR}}"

      - git -C "{{.SITE_DIR}}" init
      - git -C "{{.SITE_DIR}}" submodule add --depth 1 https://github.com/McShelby/hugo-theme-relearn.git themes/hugo-theme-relearn

      - printf "theme = 'hugo-theme-relearn'\n\nbaseURL = '/'\nlocale = 'fr-fr'\ntitle = 'Référentiel Métiers OPT-NC'\n\n[params]\nthemeVariant = ['relearn-bright', 'relearn-dark']\n\n[markup.goldmark.renderer]\nunsafe = true\n" > "{{.SITE_DIR}}/hugo.toml"

      - uv run src/generate-md.py --site-dir "{{.SITE_DIR}}"

      - hugo -s "{{.SITE_DIR}}"

      - cmd: printf "\033[32mtask [site] Site Hugo généré avec succès dans {{.SITE_DIR}}/public.\033[0m\n"
        platforms: [linux]
      - cmd: powershell -NoProfile -Command "Write-Host 'task [site] Site Hugo généré avec succès dans {{.SITE_DIR}}/public.' -ForegroundColor Green"
        platforms: [windows]
    silent: true

  install-uv:
    desc: Vérifie si uv est installé, sinon l'installe.
    status:
      - uv --version 
    cmds:
      - pip install uv
    silent: true

  setup-python:
    desc: Install la version Python fixée sur .python-version et ajoute les dépendances Python nécessaires.
    deps: [install-uv]
    cmds:
      - uv venv --clear
      - uv pip install -r requirements.txt
    silent: true
