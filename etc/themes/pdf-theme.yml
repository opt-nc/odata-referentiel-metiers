extends: default

page_margin: [25mm, 15mm, 15mm, 15mm]

role_subtitle_font_size: 16
role_subtitle_font_color: #424242

role_maintitle_font_size: 36
role_maintitle_font_color: #000000

running_content_start_at: 2
page_numbering_start_at: 2
header_height: 50
header_padding: [0, 0, 0, 0]
header_line_height: 1.1
header_border_width: 0.5
header_border_color: '#BDBDBD'
header_font_style: bold
header_recto_left_content: '{document-title}'
header_recto_center_content: 'image:../../data/static/assets/logo/OPT_NC.png[width=90]'
header_recto_right_content: 'OPT - NC - 2025'
header_verso_left_content: '{document-title}'
header_verso_center_content: 'image:../../data/static/assets/logo/OPT_NC.png[width=90]'
header_verso_right_content: 'OPT - NC - 2025'
header_background_color: '#FFFFFF'

footer_height: 40
footer_padding: [0, 0, 0, 0]
footer_border_width: 0.5
footer_border_color: '#BDBDBD'
footer_font_style: bold
footer_recto_left_content: ''
footer_recto_right_content: '{page-number}'
footer_verso_left_content: ''
footer_verso_right_content: '{page-number}'

role_red_font_color: #E53935
role_orange_font_color: #FB8C00
role_yellow_font_color: #FFC107
role_green_font_color: #43A047
role_blue_font_color: #1565C0
role_lightblue_font_color: #29B6F6
role_brown_font_color: #5D4037
role_gray_font_color: #BDBDBD

abstract:
  font-size: 10
  font-style: italic
  line-height: 1.3

base:
  font-size: 9

heading:
  h1-font-size: 22
  h2-font-size: 18
  h3-font-size: 15
  h4-font-size: 12

quote:
  font-size: 9
  font-style: italic
  attribution-font-size: 8
  attribution-font-style: normal
  border-color: #1E88E5

admonition:
  font-size: 8
  icon:
    tip:
      size: 14
      stroke-color: #FBC02D

table:
  font-size: 9
  head-background-color: #F5F5F5 
  head-font-color: #263238

caption:
  font-size: 8