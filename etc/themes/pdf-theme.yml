extends: default

page:
  margin: [25mm, 25mm, 25mm, 25mm]
  numbering:
    start_at: 2

running_content:
  start_at: 2

header:
  height: 50
  padding: [0, 0, 0, 0]
  line_height: 1.1
  border_width: 0.5
  border_color: '#BDBDBD'
  background_color: '#FFFFFF'
  font_style: bold
  recto: &header_content
    left:
      content: '{document-title}'
    center:
      content: 'image:../../data/static/assets/logo/OPT_NC.png[width=90]'
    right:
      content: 'OPT - NC - 2025'
  verso: *header_content

footer:
  height: 40
  padding: [0, 0, 0, 0]
  border_width: 0.5
  border_color: '#BDBDBD'
  font_style: bold
  recto: &footer_content
    left:
      content: ''
    center:
      content: '{chapter-title}'
    right:
      content: '{page-number}'
  verso: *footer_content

base:
  font_size: 9

heading:
  h1_font_size: 22
  h2_font_size: 18
  h3_font_size: 15
  h4_font_size: 12

  chapter:
    break_before: auto
  section:
    break_before: auto

abstract:
  font_size: 10
  font_style: italic
  line_height: 1.3

quote:
  font_size: 9
  font_style: italic
  attribution_font_size: 8
  attribution_font_style: normal
  border_color: '#1E88E5'

admonition:
  font_size: 8
  icon:
    tip:
      size: 14
      stroke_color: '#FBC02D'

table:
  font_size: 9
  head:
    background_color: '#F5F5F5'
    font_color: '#263238'
  caption:
    font_size: 8

role:
  # Couleurs texte par famille métier
  vente-relation-client:
    font_color: '#7A004B'
  marketing-et-communication:
    font_color: '#F699D2'
  services-bancaires:
    font_color: '#009CAB'
  activites-postales:
    font_color: '#FBC109'
  telecommunications:
    font_color: '#FF0005'
  administration:
    font_color: '#007A3F'
  ressources-humaines:
    font_color: '#B87BD8'
  finances-budget:
    font_color: '#F16B20'
  patrimoine-bati:
    font_color: '#88B04B'
  logistique:
    font_color: '#7FC9CB'
  systemes-d-information:
    font_color: '#0F4C81'
  pilotage:
    font_color: '#FFBE98'

  # Fonds couleur par famille métier
  vente-relation-client-bg:
    background_color: '#7A004B'
  marketing-et-communication-bg:
    background_color: '#F699D2'
  services-bancaires-bg:
    background_color: '#009CAB'
  activites-postales-bg:
    background_color: '#FBC109'
  telecommunications-bg:
    background_color: '#FF0005'
  administration-bg:
    background_color: '#007A3F'
  ressources-humaines-bg:
    background_color: '#B87BD8'
  finances-budget-bg:
    background_color: '#F16B20'
  patrimoine-bati-bg:
    background_color: '#88B04B'
  logistique-bg:
    background_color: '#7FC9CB'
  systemes-d-information-bg:
    background_color: '#0F4C81'
  pilotage-bg:
    background_color: '#FFBE98'

  # Titres
  titre-sommaire:
    font_size: 24
    font_style: bold
  titre-famille:
    font_size: 20
    font_style: bold
  bloc-numero:
    font_size: 28
    font_style: bold
    font_color: '#FFFFFF'

  # Couleurs génériques
  subtitle:
    font_size: 16
    font_color: '#424242'
  maintitle:
    font_size: 36
    font_color: '#000000'
  red:
    font_color: '#E53935'
  orange:
    font_color: '#FB8C00'
  yellow:
    font_color: '#FFC107'
  green:
    font_color: '#43A047'
  blue:
    font_color: '#1565C0'
  lightblue:
    font_color: '#29B6F6'
  brown:
    font_color: '#5D4037'
  gray:
    font_color: '#BDBDBD'
